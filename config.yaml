# -----------------------------------------------------------------------------
# 1. Design Identity
# -----------------------------------------------------------------------------
DESIGN_NAME: pmu_fsm
VERILOG_FILES: dir::src/pmu_fsm.sv

CLOCK_PORT:   clk
CLOCK_PERIOD: 8

PNR_SDC_FILE:     dir::src/pmu_impl.sdc
SIGNOFF_SDC_FILE: dir::src/pmu_signoff.sdc
IO_PIN_ORDER_CFG: dir::pin_order.cfg

SYNTH_STRATEGY:        DELAY 3
SYNTH_ABC_BUFFERING:       true
SYNTH_SIZING:              true
MAX_FANOUT_CONSTRAINT: 8

FP_CORE_UTIL:    45

PL_TARGET_DENSITY_PCT:              55
RUN_POST_CTS_RESIZER_TIMING:    true
PL_RESIZER_HOLD_SLACK_MARGIN:       0.20
DESIGN_REPAIR_MAX_SLEW_PCT: 35

CTS_CLK_BUFFERS:
  - sky130_fd_sc_hd__clkbuf_2
  - sky130_fd_sc_hd__clkbuf_4
  - sky130_fd_sc_hd__clkbuf_8
  - sky130_fd_sc_hd__clkbuf_16

# -----------------------------------------------------------------------------
# 8. Routing
#    RT_MAX_LAYER: met4 = restrict routing to metal layers 1-4.
#      sky130_fd_sc_hd has 5 metal layers; reserving met5 for PDN straps
#      in a larger chip integration is standard practice.
#      For a standalone hardened block, met4 is sufficient at this design size.
# -----------------------------------------------------------------------------
RT_MAX_LAYER:                 met4


# -----------------------------------------------------------------------------
# 9. Power Distribution Network (PDN)
#    Standard sky130_fd_sc_hd PDN with met1 rails + met4/met3 straps.
#    Pitch and width values are sky130_fd_sc_hd recommended defaults.
#    Adjust PDN_VPITCH / PDN_HPITCH if IR-drop analysis shows violations.
# -----------------------------------------------------------------------------
PDN_VOFFSET: 5
PDN_HOFFSET: 5
PDN_VWIDTH:  1.6
PDN_HWIDTH:  1.6
PDN_VPITCH:  27
PDN_HPITCH:  27


pdk::sky130*:
  FP_CORE_UTIL: 45
  CLOCK_PERIOD: 8.0
  scl::sky130_fd_sc_hs:
    CLOCK_PERIOD: 8
  scl::sky130_fd_sc_ls:
    MAX_FANOUT_CONSTRAINT: 5
pdk::gf180mcu*:
  CLOCK_PERIOD: 24.0
  FP_CORE_UTIL: 38
  MAX_FANOUT_CONSTRAINT: 4
  PL_TARGET_DENSITY: 0.0
